services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_BASE_URL: /apps/schedule/
    depends_on:
      - server
    ports:
      - "8888:80"
    restart: unless-stopped
