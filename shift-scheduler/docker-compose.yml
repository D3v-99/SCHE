version: "3.9"

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
